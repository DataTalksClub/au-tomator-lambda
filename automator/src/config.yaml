  - reaction: delete
    type: DELETE_MESSAGE
    message: |
      Hi <@{user}>! 

      You posted this message in <#{channel}>:

      > {user_message}

      Your message was removed from the channel because it was either double posting or violating some of the community guidelines:

      https://datatalks.club/docs/general/guidelines/

      Apologies for the inconvenience. Thank you!
    thread_message: |
      Hi <@{user}>! 

      Your message in <#{channel}> was removed because the parent message was deleted for violating community guidelines:

      https://datatalks.club/docs/general/guidelines/

      Apologies for the inconvenience. Thank you!

  - reaction: ask-ai
    type: ASK_AI
    model: meta-llama/llama-4-scout-17b-16e-instruct
    prompt_template: |
      You're a helpful assistant. Answer the following question. Restrict your answer to 2500 characters.

      {user_message}
    answer_template: |
      Hi <@{user}>! We asked AI, and this is what it answered:

      {ai_response}

  - reaction: ban-user
    type: BAN_USER
    lookback_hours: 24
    reply_message: |
      Hi <@{user}>!

      Your message in <#{channel}> was deleted because the parent message or thread topic was removed for violating the community guidelines:

      https://datatalks.club/docs/general/guidelines/

      Since the parent was removed, your reply was also removed. If you'd like to continue the conversation, here's the message you wrote — feel free to repost it in another thread:

      > {user_message}
    admin_message: |
      🚨 Ban cleanup completed

      *User:* <@{target_user}>
      *User ID:* `{target_user_id}`
      *Display name:* {display_name}
      *Real name:* {real_name}
      *Email:* {email}
      *Profile last updated:* {updated}

      *Messages deleted:* {deleted_count}
      *Thread replies deleted:* {thread_deleted_count}

      *Next step — deactivate manually:*
      1. Open <{admin_url}|admin members page>
      2. Search for this exact user ID: `{target_user_id}`
      3. Open the matching member and deactivate.
