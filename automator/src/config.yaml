reactions:
  - reaction: dont-ask-to-ask-just-ask
    type: SLACK_POST
    message: >
      Don't ask to ask: https://dontasktoask.com/

  - reaction: be-specific
    type: SLACK_POST
    placeholders:
      guide:
        course-ml-zoomcamp: https://datatalks.club/docs/courses/zoomcamp-logistics/asking-questions/
        course-data-engineering: https://datatalks.club/docs/courses/zoomcamp-logistics/asking-questions/
        course-mlops-zoomcamp: https://datatalks.club/docs/courses/zoomcamp-logistics/asking-questions/
        course-llm-zoomcamp: https://datatalks.club/docs/courses/zoomcamp-logistics/asking-questions/
        course-ai-dev-tools-zoomcamp: https://datatalks.club/docs/courses/zoomcamp-logistics/asking-questions/
        course-stock-markets-analytics-zoomcamp: https://datatalks.club/docs/courses/zoomcamp-logistics/asking-questions/
        default: https://datatalks.club/docs/general/guidelines/asking-for-help/
      context:
        course-ml-zoomcamp: the module, lesson, homework, or project step
        course-data-engineering: the module, lesson, homework, or project step
        course-mlops-zoomcamp: the module, lesson, homework, or project step
        course-llm-zoomcamp: the module, lesson, homework, or project step
        course-ai-dev-tools-zoomcamp: the module, lesson, homework, or project step
        course-stock-markets-analytics-zoomcamp: the module, lesson, homework, or project step
        default: the relevant context and environment
    message: |
      Please be more specific: include what you're trying to do, {context}, the exact command you ran, the full error message as text, and what you've already tried.

      Without those details people can only guess, so it's not possible to help effectively.

      Follow <{guide}|these recommendations> to make it easier for others to help you.

  - reaction: thread
    type: SLACK_POST
    message: >
      Please use threads to keep the discussion more organized:
      https://datatalks.club/docs/general/guidelines/discussions/

  - reaction: thread-please
    type: DELETE_MESSAGE
    message: |
      Hi <@{user}>! 

      You posted this message in <#{channel}>:

      > {user_message}

      Please don't use the "Also send to channel" (broadcast) functionality when replying in threads. This is against our community guidelines:

      https://datatalks.club/docs/general/guidelines/discussions/

      Your message was removed from the channel. Feel free to repost it in the thread without using the broadcast functionality.

      Thank you for helping us keep the community organized!

  - reaction: faq
    type: FAQ_ASSISTANT

  - reaction: error-log-to-thread-please
    type: REPOST_TO_THREAD_AND_DELETE
    placeholders:
      link:
        course-ml-zoomcamp: https://datatalks.club/docs/courses/zoomcamp-logistics/asking-questions/
        course-data-engineering: https://datatalks.club/docs/courses/zoomcamp-logistics/asking-questions/
        course-mlops-zoomcamp: https://datatalks.club/docs/courses/zoomcamp-logistics/asking-questions/
        course-llm-zoomcamp: https://datatalks.club/docs/courses/zoomcamp-logistics/asking-questions/
        course-ai-dev-tools-zoomcamp: https://datatalks.club/docs/courses/zoomcamp-logistics/asking-questions/
        course-stock-markets-analytics-zoomcamp: https://datatalks.club/docs/courses/zoomcamp-logistics/asking-questions/
        default: https://datatalks.club/docs/general/guidelines/asking-for-help/
    message: |
      Removing the message from the channel to save space. Please move the error log to the thread.

      Use code block for formatting the log: https://slack.com/help/articles/202288908-Format-your-messages

      Follow <{link}|these recommendations> to make it easier to help you.

      Here's the original message:

      > {user_message}

  - reaction: no-screenshot
    type: SLACK_POST
    placeholders:
      link:
        course-ml-zoomcamp: https://datatalks.club/docs/courses/zoomcamp-logistics/asking-questions/
        course-data-engineering: https://datatalks.club/docs/courses/zoomcamp-logistics/asking-questions/
        course-mlops-zoomcamp: https://datatalks.club/docs/courses/zoomcamp-logistics/asking-questions/
        course-llm-zoomcamp: https://datatalks.club/docs/courses/zoomcamp-logistics/asking-questions/
        course-ai-dev-tools-zoomcamp: https://datatalks.club/docs/courses/zoomcamp-logistics/asking-questions/
        course-stock-markets-analytics-zoomcamp: https://datatalks.club/docs/courses/zoomcamp-logistics/asking-questions/
        default: https://datatalks.club/docs/general/guidelines/asking-for-help/
    message: |
      Please don't post screenshots or pictures of your code, they are very difficult to read.

      Instead, copy the code and put it in a code block.

      Follow <{link}|these recommendations> to make it easier to help you.

  - reaction: shameless-rules
    type: DELETE_MESSAGE
    message: |
      Hi <@{user}>! 

      You created this message in <#{channel}>:

      > {user_message}

      We want to make this community useful for everyone, that's why we ask you to follow the "shameless channels" template and the rules:

      https://datatalks.club/docs/general/guidelines/promotion/

      Your post was removed from the channel. Please adjust your post.

      Apologies for the inconvenience. Thank you!
    thread_message: |
      Hi <@{user}>! 

      Your message in <#{channel}> was removed because the parent message violated the shameless promotion rules.

      If the topic starter reposts it following the proper template, you can continue the discussion there.

      Apologies for the inconvenience. Thank you!

  - reaction: jobs-rules
    type: DELETE_MESSAGE
    message: |
      Hi <@{user}>! 

      You created this message in <#{channel}>:

      > {user_message}

      We want to make this community useful for everyone, that's why we ask you to follow the templates and the rules suggested here:

