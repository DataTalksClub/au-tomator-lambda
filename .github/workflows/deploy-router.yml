name: Deploy Router Lambda

on:
  workflow_run:
    workflows: ["Run Tests"]
    types:
      - completed
  workflow_dispatch:

env:
  AWS_REGION: eu-west-1
  ROUTER_FUNCTION_NAME: ${{ vars.ROUTER_FUNCTION_NAME || 'slack-test' }}

jobs:
  deploy-router:
    runs-on: ubuntu-latest
    if: (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Package router Lambda
      run: |
        bash router/package.sh

    - name: Deploy router Lambda
      run: |
        bash router/deploy.sh

    - name: Verify router deployment
      run: |
        aws lambda get-function \
          --function-name "$ROUTER_FUNCTION_NAME" \
          --region "$AWS_REGION" \
          --query 'Configuration.LastModified' \
          --output text
        echo "Router Lambda function updated successfully"
