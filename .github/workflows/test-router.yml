name: Test Router

on:
  push:
    branches: [ main ]
    paths:
      - 'router/**'
      - '.github/workflows/test-router.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'router/**'
      - '.github/workflows/test-router.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: router
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: uv sync

    - name: Run tests
      run: uv run python -m unittest discover tests -v
